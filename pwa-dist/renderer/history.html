<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>채점 기록</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <script type="module" crossorigin src="/assets/history-DuvwNGhz.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/pwa-register-DQTc-xiv.js">
  <link rel="modulepreload" crossorigin href="/assets/pdf-viewer-CDiwYYl6.js">
  <link rel="stylesheet" crossorigin href="/assets/pwa-register-vSEALvOB.css">
</head>
<body class="history-page">
  <main id="history-container" class="history-container list-only">
    <section class="history-panel" aria-label="채점 기록">
      <header class="history-header">
        <button id="back-btn" class="back-button" type="button">뒤로가기</button>
        <div>
          <p class="eyebrow">채점 기록</p>
          <h1 id="history-title">CBT</h1>
        </div>
      </header>

      <div id="history-list" class="history-list"></div>
      <section class="history-detail">
        <h2>상세</h2>
        <p id="history-summary" class="score-display">기록을 선택하세요.</p>
        <p id="history-wrong-list" class="wrong-list"></p>
        <div id="history-answer-container" class="answer-container"></div>
      </section>
    </section>

    <section class="pdf-panel" aria-label="문제 PDF">
      <div id="pdf-viewer" class="pdf-viewer">
        <canvas id="pdf-canvas"></canvas>
        <p id="pdf-status" class="pdf-status">PDF를 불러오는 중입니다.</p>
      </div>
      <footer class="pdf-toolbar history-pdf-toolbar" aria-label="PDF 제어">
        <button id="prev-page-btn" class="secondary-button" type="button">이전</button>
        <span id="page-display">0 / 0 page</span>
        <button id="next-page-btn" class="secondary-button" type="button">다음</button>
        <button id="zoom-out-btn" class="secondary-button" type="button">-</button>
        <label class="zoom-control">
          <span>배율</span>
          <input id="zoom-input" type="number" min="40" max="300" step="10" value="120">
          <span>%</span>
        </label>
        <button id="zoom-in-btn" class="secondary-button" type="button">+</button>
        <button id="fit-page-btn" class="secondary-button" type="button">맞춤</button>
      </footer>
    </section>
  </main>

</body>
</html>
